device:
  name: DuplicateFieldChip
  version: "0.1.0"
  description: Duplicate field target
  addressUnitBits: 8
  width: 32
  peripherals:
    - name: GPIOA
      description: GPIO bank A
      baseAddress: "0x40000000"
      registers:
        - name: CTRL
          description: Control register
          addressOffset: "0x0"
          fields:
            - name: ENABLE
              description: First enable
              bitOffset: 0
              bitWidth: 1
            - name: ENABLE
              description: Duplicate enable
              bitOffset: 1
              bitWidth: 1
